<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#140a0e">
  <title>Resta Port Said</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:       #85714D;
      --gold-mid:   #a8906a;
      --gold-light: #c9aa82;
      --gold-pale:  #ede0cc;
      --burg:       #6f2c3f;
      --burg-deep:  #4a1a28;
      --ink:        #140a0e;
      --cream:      #f5ede0;
      --cream-dim:  #c9b99e;
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--ink);
      color: var(--cream);
      min-height: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: var(--ink);
      overflow: hidden;
      pointer-events: none;
    }
    .bg::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 15% 10%, rgba(111,44,63,0.55) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 85% 85%, rgba(133,113,77,0.25) 0%, transparent 50%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(74,26,40,0.3) 0%, transparent 60%);
    }
    .bg-diamond {
      position: absolute;
      border: 1px solid rgba(133,113,77,0.09);
      transform: rotate(45deg);
      top: 50%; left: 50%;
      border-radius: 4px;
    }
    .bg-diamond:nth-child(1) { width:min(600px,90vw);height:min(600px,90vw);margin:calc(min(600px,90vw)/-2) 0 0 calc(min(600px,90vw)/-2); }
    .bg-diamond:nth-child(2) { width:min(420px,65vw);height:min(420px,65vw);margin:calc(min(420px,65vw)/-2) 0 0 calc(min(420px,65vw)/-2);border-color:rgba(133,113,77,0.13); }
    .bg-diamond:nth-child(3) { width:min(260px,42vw);height:min(260px,42vw);margin:calc(min(260px,42vw)/-2) 0 0 calc(min(260px,42vw)/-2);border-color:rgba(133,113,77,0.17); }

    .corner-ornament {
      position: absolute;
      width: clamp(60px, 10vw, 110px);
      height: clamp(60px, 10vw, 110px);
      opacity: 0.18;
      pointer-events: none;
    }
    .corner-ornament svg { width:100%;height:100%; }
    .corner-ornament.tl { top: max(16px, env(safe-area-inset-top, 16px)); left: max(16px, env(safe-area-inset-left, 16px)); }
    .corner-ornament.tr { top: max(16px, env(safe-area-inset-top, 16px)); right: max(16px, env(safe-area-inset-right, 16px)); transform: scaleX(-1); }
    .corner-ornament.bl { bottom: max(16px, env(safe-area-inset-bottom, 16px)); left: max(16px, env(safe-area-inset-left, 16px)); transform: scaleY(-1); }
    .corner-ornament.br { bottom: max(16px, env(safe-area-inset-bottom, 16px)); right: max(16px, env(safe-area-inset-right, 16px)); transform: scale(-1,-1); }

    /* ── HOME SCREEN ── */
    #home {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: max(5rem, calc(env(safe-area-inset-top, 0px) + 4rem))
               max(1.2rem, env(safe-area-inset-right, 1.2rem))
               max(3rem, calc(env(safe-area-inset-bottom, 0px) + 2.5rem))
               max(1.2rem, env(safe-area-inset-left, 1.2rem));
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: clamp(2rem, 5vw, 3.5rem);
      animation: fadeDown 0.8s ease both;
    }
    .pre-title {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: clamp(0.6rem, 1.8vw, 0.72rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold-mid);
      margin-bottom: 0.9rem;
    }
    .hotel-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3rem, 11vw, 5rem);
      letter-spacing: 0.18em;
      color: var(--gold-light);
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .hotel-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.95rem, 3.5vw, 1.4rem);
      letter-spacing: 0.12em;
      color: var(--cream-dim);
    }
    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.2rem auto 0;
      width: min(300px, 75%);
    }
    .divider-line { flex:1; height:1px; background: linear-gradient(to right, transparent, var(--gold), transparent); }
    .divider-gem {
      width: 6px; height: 6px;
      border: 1px solid var(--gold-mid);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ── CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(0.8rem, 2vw, 1.2rem);
      width: min(860px, 100%);
    }

    .card {
      position: relative;
      background: rgba(74,26,40,0.25);
      border: 1px solid rgba(133,113,77,0.22);
      border-radius: 4px;
      padding: clamp(1.3rem, 4vw, 2rem) clamp(1rem, 3vw, 1.8rem);
      cursor: pointer;
      overflow: hidden;
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
      gap: clamp(0.6rem, 1.5vw, 1rem);
      animation: cardIn 0.7s ease both;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      transition: border-color 0.3s, background 0.3s, transform 0.25s;
    }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(133,113,77,0.09) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* hover — desktop */
    @media (hover: hover) {
      .card:hover {
        border-color: rgba(133,113,77,0.65);
        background: rgba(111,44,63,0.35);
        transform: translateY(-3px);
      }
      .card:hover::before { opacity: 1; }
      .card:hover .card-shine { left: 140%; }
      .card:hover .card-arrow { opacity:1; transform:translateX(0); }
    }

    /* active — touch */
    .card:active {
      border-color: rgba(133,113,77,0.6);
      background: rgba(111,44,63,0.38);
      transform: scale(0.97);
      transition-duration: 0.1s;
    }
    .card:active::before { opacity: 1; }

    .card-shine {
      position: absolute;
      top: 0; left: -60%;
      width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
      transform: skewX(-15deg);
      transition: left 0.6s ease;
      pointer-events: none;
    }

    .card-icon {
      width: clamp(46px, 12vw, 56px);
      height: clamp(46px, 12vw, 56px);
      border: 1px solid rgba(133,113,77,0.35);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(133,113,77,0.1);
      flex-shrink: 0;
    }
    .card-icon svg {
      width: clamp(22px, 5vw, 26px);
      height: clamp(22px, 5vw, 26px);
      stroke: var(--gold-light);
      fill: none;
      stroke-width: 1.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: clamp(1rem, 3.5vw, 1.25rem);
      letter-spacing: 0.07em;
      color: var(--gold-pale);
      line-height: 1.2;
    }
    .card-desc {
      font-size: clamp(0.6rem, 1.8vw, 0.72rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-mid);
      opacity: 0.75;
    }
    .card-arrow {
      margin-top: 0.2rem;
      font-size: 1rem;
      color: var(--gold);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.3s, transform 0.3s;
    }

    /* ── FOOTER ── */
    .footer-note {
      margin-top: clamp(1.8rem, 4vw, 2.5rem);
      font-size: clamp(0.58rem, 1.6vw, 0.68rem);
      font-weight: 200;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(201,185,158,0.32);
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── MOBILE SINGLE COLUMN ── */
    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
      .card { flex-direction: row; text-align: left; gap: 1rem; padding: 1.1rem 1.2rem; }
      .card-title { font-size: 1.05rem; }
      .card-desc { font-size: 0.62rem; }
      .card-arrow { display: none; }
    }

    /* ── LANDSCAPE MOBILE ── */
    @media (max-height: 500px) and (orientation: landscape) {
      #home { padding-top: 1.5rem; padding-bottom: 1.5rem; justify-content: flex-start; gap: 1rem; }
      .header { margin-bottom: 1rem; }
      .hotel-name { font-size: 2.5rem; }
      .cards { grid-template-columns: repeat(4, 1fr); gap: 0.7rem; }
      .card { padding: 0.9rem 0.8rem; }
      .card-icon { width: 40px; height: 40px; }
      .corner-ornament.bl, .corner-ornament.br { display: none; }
    }

    /* ── VERY SMALL SCREENS ── */
    @media (max-width: 320px) {
      .hotel-name { font-size: 2.4rem; }
      .hotel-sub { font-size: 0.85rem; letter-spacing: 0.06em; }
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg">
  <div class="bg-diamond"></div>
  <div class="bg-diamond"></div>
  <div class="bg-diamond"></div>
  <div class="corner-ornament tl">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 95 L5 5 L95 5" stroke="#85714D" stroke-width="1.5"/>

    </svg>
  </div>
  <div class="corner-ornament bl">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 95 L5 5 L95 5" stroke="#85714D" stroke-width="1.5"/>
      <circle cx="5" cy="5" r="3" fill="#85714D" opacity="0.6"/>

      <circle cx="5" cy="5" r="3" fill="#85714D" opacity="0.6"/>
      <path d="M30 5 L30 20 M5 30 L20 30" stroke="#85714D" stroke-width="0.5" opacity="0.4"/>
    </svg>
  </div>
</div>

<!-- HOME -->
<div id="home">

  <div class="header">
    <h1 class="hotel-name">Resta</h1>

      <div class="divider-line"></div>

      <div class="divider-line"></div>

  </div>

  <div class="cards">

    <!-- Green House Menu -->
    <div class="card" onclick="window.open('https://beamish-jalebi-776015.netlify.app','_blank')">

</div>

<script>
  const SVG_ATTRS = 'viewBox="0 0 24 24" fill="none" stroke="#c9aa82" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="width:26px;height:26px"';

  const icons = [
    `<svg ${SVG_ATTRS}><path d="M12 22V12"/><path d="M12 12C12 12 7 11 5 6c4 0 7 3 7 6z"/><path d="M12 12C12 12 17 11 19 6c-4 0-7 3-7 6z"/><path d="M5 22h14"/></svg>`,
    `<svg ${SVG_ATTRS}><path d="M8 22h8"/><path d="M12 11v11"/><path d="M6 2l1.5 8A4.5 4.5 0 0012 14a4.5 4.5 0 004.5-4L18 2z"/></svg>`,
    `<svg ${SVG_ATTRS}><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
    `<svg ${SVG_ATTRS}><circle cx="9" cy="12" r="4"/><circle cx="15" cy="12" r="4"/><path d="M9 8V6M15 8V6M9 16v2M15 16v2"/></svg>`,
    `<svg ${SVG_ATTRS}><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
  ];

  icons.forEach((svg, i) => {
    const el = document.getElementById('icon-' + i);
    if (el) el.innerHTML = svg;
  });

  // Mobile: adjust card layout text alignment in row mode
  function adjustLayout() {
    const isRow = window.innerWidth <= 480;
    document.querySelectorAll('.card > div:not(.card-shine)').forEach(d => {
      d.style.textAlign = isRow ? 'left' : 'center';
    });
  }
  adjustLayout();
  window.addEventListener('resize', adjustLayout);
</script>
</body>
</html>
