<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عروض الأفراح والخطوبة — رستا بورسعيد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --gold:      #85714D;
    --gold-light:#9a7f52;
    --gold-pale: #5c3d1e;
    --burg:      #6f2c3f;
    --burg-dark: #4a1929;
    --burg-mid:  #8b3a50;
    --cream:     #f7f0e0;
    --dark:      #f2e8d0;
    --card-bg:   #ffffff;
    --text-main: #1e1008;
    --text-muted:#5c3d1e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Amiri', serif;
    background-color: var(--dark);
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(111,44,63,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(133,113,77,0.07) 0%, transparent 60%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(133,113,77,0.03) 40px,
        rgba(133,113,77,0.03) 41px
      );
  }

  /* ═══════════════════════════════════ HEADER */
  header {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
  }

  .hotel-label {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--burg);
    margin-bottom: 16px;
    display: block;
  }

  header h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(38px, 6vw, 66px);
    font-weight: 700;
    color: var(--burg-dark);
    line-height: 1.2;
    text-shadow: 0 2px 12px rgba(111,44,63,0.12);
  }

  .title-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin: 22px auto 10px;
    max-width: 460px;
  }
  .title-divider::before,
  .title-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .diamond {
    width: 8px; height: 8px;
    background: var(--gold-light);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 19px;
    font-style: italic;
    margin-top: 6px;
  }

  .notice-bar {
    display: inline-block;
    margin-top: 26px;
    padding: 10px 28px;
    border: 1px solid rgba(111,44,63,0.35);
    border-radius: 2px;
    background: rgba(111,44,63,0.08);
    color: var(--burg-dark);
    font-size: 16px;
    letter-spacing: 0.5px;
  }
  .notice-bar strong {
    color: var(--burg);
  }

  /* ═══════════════════════════════════ GRID */
  .packages-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 28px;
    max-width: 1260px;
    margin: 50px auto 80px;
    padding: 0 28px;
  }

  /* ═══════════════════════════════════ CARD */
  .pkg-card {
    background: var(--card-bg);
    border: 1px solid rgba(111,44,63,0.18);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    animation: fadeUp 0.6s ease both;
    box-shadow: 0 4px 16px rgba(111,44,63,0.08);
  }
  .pkg-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 50px rgba(111,44,63,0.15), 0 0 0 1px rgba(111,44,63,0.25);
    border-color: rgba(111,44,63,0.3);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .pkg-card:nth-child(1) { animation-delay: 0.05s; }
  .pkg-card:nth-child(2) { animation-delay: 0.12s; }
  .pkg-card:nth-child(3) { animation-delay: 0.19s; }
  .pkg-card:nth-child(4) { animation-delay: 0.26s; }
  .pkg-card:nth-child(5) { animation-delay: 0.33s; }
  .pkg-card:nth-child(6) { animation-delay: 0.40s; }

  /* tier accent stripe */
  .pkg-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0; left: 0;
    height: 3px;
    background: var(--accent-color, var(--gold));
  }

  .pkg-card[data-tier="silver"]  { --accent-color: #8a9ba8; }
  .pkg-card[data-tier="gold"]    { --accent-color: #c8960c; }
  .pkg-card[data-tier="diamond"] { --accent-color: #4a9ab5; }
  .pkg-card[data-tier="royal"]   { --accent-color: #7b3fa0; }
  .pkg-card[data-tier="elegance"]{ --accent-color: #85714D; }
  .pkg-card[data-tier="prestige"]{ --accent-color: #6f2c3f; background: #fff5f7; }

  /* ── Card Header */
  .card-header {
    padding: 28px 26px 20px;
    border-bottom: 1px solid rgba(111,44,63,0.1);
    position: relative;
  }

  .tier-badge {
    position: absolute;
    top: 22px;
    left: 22px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(111,44,63,0.07);
    border: 1px solid rgba(111,44,63,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .pkg-name {
    font-family: 'Amiri', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--burg-dark);
    line-height: 1;
    margin-bottom: 6px;
  }
  .pkg-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* ── Features list */
  .features {
    padding: 22px 26px 18px;
    flex: 1;
    list-style: none;
  }
  .features li {
    font-size: 17px;
    color: #2c1810;
    padding: 8px 0;
    border-bottom: 1px solid rgba(111,44,63,0.08);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.6;
  }
  .features li:last-child { border-bottom: none; }
  .features li::before {
    content: '◆';
    color: var(--burg);
    font-size: 9px;
    flex-shrink: 0;
    margin-top: 6px;
    opacity: 0.7;
  }

  /* ── Calculator */
  .calculator {
    margin: 0 20px 24px;
    background: rgba(111,44,63,0.04);
    border: 1px solid rgba(111,44,63,0.15);
    border-radius: 3px;
    padding: 20px;
  }

  .calc-label {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: block;
  }
  .guest-label {
    font-size: 15px;
    color: var(--text-muted);
    white-space: nowrap;
    flex: 1;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    width: 100%;
  }

  .guest-input {
    width: 80px;
    min-width: 0;
    flex-shrink: 1;
    background: #fff;
    border: 1.5px solid rgba(111,44,63,0.35);
    border-radius: 3px;
    color: #1e1008;
    font-family: 'Amiri', serif;
    font-size: 18px;
    padding: 9px 6px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  .guest-input::-webkit-outer-spin-button,
  .guest-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .guest-input:focus {
    border-color: var(--burg);
    box-shadow: 0 0 0 3px rgba(111,44,63,0.1);
  }
  .guest-input::placeholder { color: rgba(92,61,30,0.35); font-size: 13px; }

  .btn-adjust {
    width: 38px;
    height: 38px;
    flex-shrink: 0;
    background: rgba(111,44,63,0.08);
    border: 1.5px solid rgba(111,44,63,0.3);
    border-radius: 3px;
    color: var(--burg);
    font-size: 24px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s;
    line-height: 1;
    font-weight: 300;
    user-select: none;
    padding: 0;
  }
  .btn-adjust:hover {
    background: rgba(111,44,63,0.18);
    color: var(--burg-dark);
  }

  .result-box {
    background: rgba(111,44,63,0.05);
    border: 1.5px solid rgba(111,44,63,0.2);
    border-radius: 3px;
    padding: 14px 18px;
    text-align: center;
    min-height: 72px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.3s ease;
  }

  .result-box.has-value {
    border-color: var(--burg);
    background: linear-gradient(135deg, rgba(111,44,63,0.08), rgba(74,25,41,0.06));
    box-shadow: 0 0 16px rgba(111,44,63,0.1);
  }

  .result-amount {
    font-family: 'Amiri', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--burg-dark);
    letter-spacing: 1px;
  }
  .result-empty {
    color: rgba(92,61,30,0.4);
    font-size: 15px;
    font-style: italic;
  }
  .result-note {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ═══════════════════════════════════ FOOTER */
  footer {
    text-align: center;
    padding: 30px 20px 50px;
    border-top: 1px solid rgba(111,44,63,0.15);
    color: var(--text-muted);
    font-size: 15px;
  }
  footer span { color: var(--burg); }

  /* ═══════════════════════════════════ ORNAMENT */
  .ornament {
    text-align: center;
    color: var(--burg);
    font-size: 22px;
    opacity: 0.4;
    letter-spacing: 8px;
    margin: 8px 0;
  }

  /* Prestige card special glow */
  .pkg-card[data-tier="prestige"]:hover {
    box-shadow: 0 20px 50px rgba(111,44,63,0.18), 0 0 0 1px rgba(111,44,63,0.3);
  }

  @media (max-width: 700px) {
    .packages-grid { grid-template-columns: 1fr; padding: 0 16px; }
    header { padding: 40px 16px 28px; }
  }
</style>
</head>
<body>

<header>
  <span class="hotel-label">Resta Port Said Hotel</span>
  <h1>عروض الأفراح والخطوبة</h1>
  <div class="title-divider">
    <div class="diamond"></div>
    <div class="diamond"></div>
    <div class="diamond"></div>
  </div>
  <p class="subtitle">اختر الباقة المناسبة واحسب إجمالي تكلفة احتفالك</p>
  <div class="notice-bar">
    ⚠️ &nbsp;<strong>ممنوع منعاً باتاً</strong> إضافة أى مأكولات من الخارج
  </div>
</header>

<div class="packages-grid" id="packagesGrid">
  <!-- Cards injected by JS -->
</div>

<div class="ornament">✦ &nbsp; ✦ &nbsp; ✦</div>

<footer>
  جميع الأسعار <span>شاملة الخدمات والضرائب</span> &nbsp;|&nbsp; رستا بورسعيد
</footer>

<script>
const FIXED = 19200;

const packages = [
  {
    id: "silver",
    tier: "silver",
    name: "الفضى",
    icon: "🥈",
    subtitle: "الباقة الأساسية للاحتفالات المميزة",
    price: 270,
    features: [
      "مياه غازية + مياه معدنية",
      "قطعة جاتوة — مينى بيتزا — باتون ساليه",
      "تورتة العروسين ثلاثة أدوار",
      "دى جى",
      "كوشه + Dance Floor + عارضة ليزر + مدخل للقاعة — كراسى فيرفورجيه",
      "ميكسر مع 2 كاميرا HD + كاميرا كرين — شاشة عرض بروجيكتور"
    ]
  },
  {
    id: "gold",
    tier: "gold",
    name: "الذهبى",
    icon: "🥇",
    subtitle: "بريق إضافي لليلة لا تُنسى",
    price: 320,
    features: [
      "مياه غازية + مياه معدنية",
      "2 قطعة جاتوة — مينى بيتزا — باتون ساليه",
      "تورتة العروسين ثلاثة أدوار",
      "دى جى",
      "كوشه + Dance Floor + عارضة ليزر + مدخل للقاعة — كراسى فيرفورجيه",
      "ميكسر مع 2 كاميرا HD + كاميرا كرين — شاشة عرض بروجيكتور"
    ]
  },
  {
    id: "diamond",
    tier: "diamond",
    name: "الماسى",
    icon: "💎",
    subtitle: "لمسة من الفخامة والأناقة",
    price: 420,
    features: [
      "مياه غازية + مياه معدنية",
      "ساندويتش دجاج — باتون ساليه — مينى بيتزا — قطعة جاتوة",
      "تورتة العروسين ثلاثة أدوار",
      "دى جى",
      "كوشه + Dance Floor + عارضة ليزر + مدخل للقاعة — كراسى فيرفورجيه",
      "ميكسر مع 2 كاميرا HD + كاميرا كرين — شاشة عرض بروجيكتور"
    ]
  },
  {
    id: "royal",
    tier: "royal",
    name: "الملكى",
    icon: "👑",
    subtitle: "احتفال بأجواء ملكية راقية",
    price: 570,
    features: [
      "مياه غازية + مياه معدنية",
      "2 ساندويتش دجاج + كفتة — باتون ساليه — مينى بيتزا — قطعة جاتوة",
      "تورتة العروسين خمسة أدوار",
      "دى جى",
      "كوشه + Dance Floor + عارضة ليزر + مدخل للقاعة — كراسى فيرفورجيه",
      "ميكسر مع 2 كاميرا HD + كاميرا كرين — شاشة عرض بروجيكتور"
    ]
  },
  {
    id: "elegance",
    tier: "elegance",
    name: "إليجانس",
    icon: "✨",
    subtitle: "قمة الذوق الرفيع والتميز",
    price: 1020,
    features: [
      "مياه غازية + مياه معدنية",
      "طبق سلاطات مشكلة",
      "مشويات مشكلة: كفتة — دجاج — ستيك مع أرز شرقى",
      "قطعتا جاتوة",
      "تورتة العروسين خمسة أدوار",
      "دى جى",
      "كوشه + Dance Floor + عارضة ليزر + مدخل للقاعة — كراسى فيرفورجيه",
      "ميكسر مع 2 كاميرا HD + كاميرا كرين — شاشة عرض بروجيكتور"
    ]
  },
  {
    id: "prestige",
    tier: "prestige",
    name: "بوفيه مفتوح برستيج",
    icon: "🍽️",
    subtitle: "تجربة بوفيه فاخرة لا مثيل لها",
    price: 1320,
    features: [
      "مياه غازية + مياه معدنية",
      "بوفيه سلطات + لحوم باردة",
      "داندى روستو لكل 50 فرد",
      "جولاش باللحمة — لازانيا باللحمة المفرومة",
      "دجاج مشوى بالأعشاب — كباب حلة",
      "أرز بالخلطة — خضروات سوتيه مشكلة",
      "حلويات شرقية وغربية",
      "تورتة العروسين خمسة أدوار",
      "دى جى",
      "كوشه + Dance Floor + عارضة ليزر + مدخل للقاعة — كراسى فيرفورجيه",
      "ميكسر مع 2 كاميرا HD + كاميرا كرين — شاشة عرض بروجيكتور"
    ]
  }
];

function formatEGP(amount) {
  return amount.toLocaleString('ar-EG') + ' جنيه';
}

function buildCard(pkg) {
  const card = document.createElement('div');
  card.className = 'pkg-card';
  card.dataset.tier = pkg.tier;

  // Features HTML
  const featureItems = pkg.features.map(f => `<li>${f}</li>`).join('');

  card.innerHTML = `
    <div class="card-header">
      <span class="tier-badge">${pkg.icon}</span>
      <div class="pkg-name">${pkg.name}</div>
      <div class="pkg-subtitle">${pkg.subtitle}</div>
    </div>

    <ul class="features">${featureItems}</ul>

    <div class="calculator">
      <span class="calc-label">أدخل عدد الأفراد لحساب الإجمالى</span>
      <div class="input-row">
        <button class="btn-adjust" data-action="minus" aria-label="تقليل">−</button>
        <input
          type="number"
          class="guest-input"
          min="1"
          placeholder="0"
          aria-label="عدد الأفراد"
          inputmode="numeric"
        >
        <span class="guest-label">فرد</span>
        <button class="btn-adjust" data-action="plus" aria-label="زيادة">+</button>
      </div>
      <div class="result-box" id="result-${pkg.id}">
        <span class="result-empty">أدخل عدد الأفراد لرؤية الإجمالى</span>
      </div>
    </div>
  `;

  // Wire up interactions
  const input = card.querySelector('.guest-input');
  const resultBox = card.querySelector(`#result-${pkg.id}`);

  function calculate() {
    const guests = parseInt(input.value);
    if (!guests || guests < 1) {
      resultBox.innerHTML = `<span class="result-empty">أدخل عدد الأفراد لرؤية الإجمالى</span>`;
      resultBox.classList.remove('has-value');
      return;
    }
    const total = (guests * pkg.price) + FIXED;
    resultBox.innerHTML = `
      <div class="result-amount">${formatEGP(total)}</div>
      <div class="result-note">شامل الخدمات والضرائب</div>
    `;
    resultBox.classList.add('has-value');
  }

  input.addEventListener('input', calculate);

  card.querySelector('[data-action="plus"]').addEventListener('click', () => {
    const cur = parseInt(input.value) || 0;
    input.value = cur + 10;
    calculate();
  });

  card.querySelector('[data-action="minus"]').addEventListener('click', () => {
    const cur = parseInt(input.value) || 0;
    if (cur > 10) { input.value = cur - 10; calculate(); }
    else if (cur > 0) { input.value = 1; calculate(); }
  });

  return card;
}

const grid = document.getElementById('packagesGrid');
packages.forEach(pkg => grid.appendChild(buildCard(pkg)));
</script>
</body>
</html>
